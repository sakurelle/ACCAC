name: Build legacy Linux project1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create Dockerfile and build script
        run: |
          cat > Dockerfile.legacy <<'EOF'
          FROM debian/eol:jessie

          RUN printf 'Acquire::Check-Valid-Until "false";\nAcquire::AllowInsecureRepositories "true";\n' \
              > /etc/apt/apt.conf.d/99legacy

          RUN printf '%s\n' \
              'deb http://archive.debian.org/debian jessie main contrib non-free' \
              'deb http://archive.debian.org/debian-security jessie/updates main contrib non-free' \
              > /etc/apt/sources.list

          RUN apt-get update || true

          RUN apt-get install -y --force-yes \
              lazarus \
              fpc \
              fpc-source \
              fp-units-db \
              libpq5 \
              libpq-dev \
              libgtk2.0-dev \
              binutils \
              file \
              tar \
              gzip \
              grep \
              sed

          WORKDIR /src
          EOF

          cat > build-inside-container.sh <<'EOF'
          #!/bin/bash
          set -e

          cd /src/accac_lazarus

          echo "=== Current directory ==="
          pwd
          ls -la

          echo "=== Build environment glibc ==="
          ldd --version | head -n 1

          echo "=== Patch project1.lpr for old Lazarus ==="
          sed -i 's/Application\.Scaled:=True;//g' project1.lpr
          sed -i 's/Application\.Scaled := True;//g' project1.lpr

          echo "=== Create legacy Lazarus project file ==="
          cat > project1_legacy.lpi <<'LPI'
          <?xml version="1.0" encoding="UTF-8"?>
          <CONFIG>
            <ProjectOptions>
              <Version Value="9"/>
              <General>
                <SessionStorage Value="InProjectDir"/>
                <MainUnit Value="0"/>
                <Title Value="project1"/>
                <ResourceType Value="res"/>
                <UseXPManifest Value="True"/>
              </General>
              <BuildModes Count="1">
                <Item1 Name="Default" Default="True"/>
              </BuildModes>
              <PublishOptions>
                <Version Value="2"/>
              </PublishOptions>
              <RunParams>
                <local>
                  <FormatVersion Value="1"/>
                </local>
              </RunParams>
              <RequiredPackages Count="2">
                <Item1>
                  <PackageName Value="FCL"/>
                </Item1>
                <Item2>
                  <PackageName Value="LCL"/>
                </Item2>
              </RequiredPackages>
              <Units Count="5">
                <Unit0>
                  <Filename Value="project1.lpr"/>
                  <IsPartOfProject Value="True"/>
                  <UnitName Value="project1"/>
                </Unit0>
                <Unit1>
                  <Filename Value="unit1.pas"/>
                  <IsPartOfProject Value="True"/>
                  <ComponentName Value="FormMain"/>
                  <HasResources Value="True"/>
                  <ResourceBaseClass Value="Form"/>
                  <UnitName Value="Unit1"/>
                </Unit1>
                <Unit2>
                  <Filename Value="uniteditor.pas"/>
                  <IsPartOfProject Value="True"/>
                  <ComponentName Value="TabSheet"/>
                  <HasResources Value="True"/>
                  <ResourceBaseClass Value="Form"/>
                  <UnitName Value="UnitEditor"/>
                </Unit2>
                <Unit3>
                  <Filename Value="unitdb.pas"/>
                  <IsPartOfProject Value="True"/>
                  <UnitName Value="UnitDb"/>
                </Unit3>
                <Unit4>
                  <Filename Value="unitctr.pas"/>
                  <IsPartOfProject Value="True"/>
                  <UnitName Value="UnitCtr"/>
                </Unit4>
              </Units>
            </ProjectOptions>
            <CompilerOptions>
              <Version Value="11"/>
              <Target>
                <Filename Value="project1"/>
              </Target>
              <SearchPaths>
                <IncludeFiles Value="$(ProjOutDir)"/>
                <UnitOutputDirectory Value="lib/$(TargetCPU)-$(TargetOS)"/>
              </SearchPaths>
              <Linking>
                <Options>
                  <Win32>
                    <GraphicApplication Value="True"/>
                  </Win32>
                </Options>
              </Linking>
              <Other>
                <CompilerPath Value="$(CompPath)"/>
              </Other>
            </CompilerOptions>
          </CONFIG>
          LPI

          echo "=== Build project1 ==="
          rm -f project1
          lazbuild -B project1_legacy.lpi

          chmod +x project1

          echo "=== Binary info ==="
          file project1

          echo "=== Required GLIBC versions ==="
          readelf -V ./project1 | grep -o 'GLIBC_[0-9.]*' | sort -u || true

          echo "=== Check for too new GLIBC ==="
          if readelf -V ./project1 | grep -E 'GLIBC_2\.(2[1-9]|[3-9][0-9])'; then
            echo "ERROR: project1 requires GLIBC newer than 2.20"
            exit 1
          fi

          echo "=== Dynamic dependencies ==="
          ldd ./project1 || true
          EOF

          chmod +x build-inside-container.sh

      - name: Build Docker image
        run: |
          docker build -t accac-build-legacy -f Dockerfile.legacy .

      - name: Build project1
        run: |
          docker run --rm \
            -v "$PWD":/src \
            accac-build-legacy \
            /src/build-inside-container.sh

      - name: Pack artifact
        run: |
          mkdir -p dist
          cp accac_lazarus/project1 dist/

          if [ -f accac_lazarus/accac.ini ]; then
            cp accac_lazarus/accac.ini dist/
          fi

          tar -czf accac-linux-glibc220.tar.gz -C dist .

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: accac-linux-glibc220
          path: accac-linux-glibc220.tar.gz
