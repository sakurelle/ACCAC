name: Build Linux ACCAC

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lazarus and PostgreSQL client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lazarus \
            fpc \
            fpc-source \
            fp-units-db \
            libpq5 \
            libpq-dev \
            libgtk2.0-dev

      - name: Prepare shell scripts
        run: |
          chmod +x install_accac.sh || true
          chmod +x scripts/*.sh || true
          chmod +x db/postgresql/run_all.sh || true
          chmod +x tests/jmeter/run_accac_db_limits.sh || true

      - name: Build project
        run: |
          bash scripts/build.sh

      - name: Check build result
        run: |
          test -f build/accac
          chmod +x build/accac
          ls -lh build/accac
          file build/accac

      - name: Prepare package
        run: |
          rm -rf package
          mkdir -p package/accac
          cp build/accac package/accac/accac
          cp install_accac.sh package/accac/
          cp -r scripts package/accac/scripts
          cp -r db package/accac/db
          mkdir -p package/accac/config
          cp src/config/accac.example.ini package/accac/config/accac.example.ini
          cp README.md package/accac/
          chmod +x package/accac/accac
          chmod +x package/accac/install_accac.sh
          chmod +x package/accac/scripts/*.sh || true
          chmod +x package/accac/db/postgresql/run_all.sh || true
          tar -czf accac-linux-astra.tar.gz -C package accac

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: accac-linux-astra
          path: accac-linux-astra.tar.gz
          if-no-files-found: error
